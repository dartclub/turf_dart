name: Dart Unit Tests for PRs

on:
  workflow_dispatch:
  pull_request:
    branches: ["**"]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart --version
      - run: dart pub get
#      - run: dart format --output=none --set-exit-if-changed ./ # FIXME https://github.com/dartclub/turf_dart/pull/248

      - name: Analyze Project
        run: dart analyze
        if: always()

      - name: Run tests with coverage enabled
        run: dart test --coverage=.artefacts/coverage
        if: always()

      - name: Archive raw coverage artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: raw-coverage
          path: .artefacts/coverage

      #- name: test artefact location
      #  run: ls .artefacts/coverage
      #
      #- name: Convert to LCOV report
      #  run: |
      #    dart pub global activate coverage
      #    dart pub global run coverage:format_coverage --packages=.dart_tool/package_config.json --report-on=lib --lcov -o .artefacts/coverage/lcov.info -i .artefacts/coverage
      #- name: Generate HTML coverage report
      #  run: |
      #    sudo apt install lcov
      #    genhtml -o .artefacts/coverage/report .artefacts/coverage/lcov.info
  code-coverage:
    runs-on: ubuntu-latest
    needs: unit-tests # only run code-coverage is unit-tests pass
    steps:
      - name: test dart availability
        run: dart --version
