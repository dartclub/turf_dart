name: Dart Unit Tests for PRs

on:
  workflow_dispatch:
  pull_request:
    branches: ["**"]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart --version
      - run: dart pub get
      - run: dart format --output=none --set-exit-if-changed .

      - name: Analyze Project
        run: dart analyze
        if: always()

      - name: Run tests with coverage enabled
        run: dart test --coverage=.artefacts/coverage
        if: always()

      - name: Archive raw coverage artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: raw-coverage
          path: .artefacts/coverage

  code-coverage:
    needs: unit-tests
    if: ${{ needs.unit-tests.result == 'success' }} 
    runs-on: ubuntu-latest
    env: 
     artefacts: /home/runner/work/turf_dart/turf_dart/.artefacts/
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Print Dart SDK version
        run: dart --version

      - name: Install dependencies
        run: dart pub get

      - name: download coverage$artefacts
        uses: actions/download-artifact@v8
        with:
          name: raw-coverage
          path: .artefacts/coverage

      - name: set artefact var for bash
        run: ARTEFACTS=/home/runner/work/turf_dart/turf_dart/.artefacts/

      - name: test coverage availability
        run: |
          echo $ARTEFACTS
          ls -la $ARTEFACTS/coverage

      - name: Convert to LCOV report
        run: |
          dart pub global activate coverage
          dart pub global run coverage:format_coverage --packages=.dart_tool/package_config.json --report-on=lib --lcov -o $artefacts/coverage/lcov.info -i $artefacts/coverage

      - name: Generate HTML coverage report
        run: |
          sudo apt install lcov
          genhtml -o $artefacts/coverage/report .artefacts/coverage/lcov.info

      - name: Comment on PR with coverage
        continue-on-error: true
        uses: romeovs/lcov-reporter-action@v0.2.21
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          lcov-file: $artefacts/coverage/lcov.info

      - name: Archive coverage report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: |
            $artefacts/coverage/report
            $artefacts/coverage/lcov.info
